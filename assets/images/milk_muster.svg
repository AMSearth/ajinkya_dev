<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16161e"/>
      <stop offset="100%" stop-color="#1a1b26"/>
    </linearGradient>
    <linearGradient id="flutterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#7aa2f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)"/>

  <!-- Window Container -->
  <rect x="40" y="30" width="720" height="390" rx="12" fill="#1f2335" stroke="#414868" stroke-width="1.5"/>
  
  <!-- Header -->
  <path d="M 40 42 A 12 12 0 0 1 52 30 L 748 30 A 12 12 0 0 1 760 42 L 760 70 L 40 70 Z" fill="#16161e"/>
  <circle cx="65" cy="50" r="6" fill="#f7768e"/>
  <circle cx="85" cy="50" r="6" fill="#e0af68"/>
  <circle cx="105" cy="50" r="6" fill="#9ece6a"/>
  <text x="400" y="55" fill="#a9b1d6" font-family="monospace" font-size="13" text-anchor="middle">Milk Muster :: Mobile Dairy Logistics App (Dart + Flutter)</text>

  <!-- Left: Mobile Phone Frame -->
  <g transform="translate(100, 85)">
    <rect x="0" y="0" width="160" height="315" rx="20" fill="#0f111a" stroke="#7dcfff" stroke-width="2"/>
    <!-- Phone Notch -->
    <rect x="50" y="8" width="60" height="10" rx="5" fill="#1f2335"/>
    
    <!-- App Header inside phone -->
    <text x="80" y="45" fill="#7dcfff" font-family="sans-serif" font-size="12" font-weight="700" text-anchor="middle">MILK MUSTER</text>
    
    <!-- Milk Bottle / Dairy Icon -->
    <text x="80" y="85" fill="#7dcfff" font-family="sans-serif" font-size="28" text-anchor="middle">🥛</text>
    
    <text x="80" y="115" fill="#a9b1d6" font-family="sans-serif" font-size="10" text-anchor="middle">Today's Collection</text>
    <text x="80" y="140" fill="#73daca" font-family="sans-serif" font-size="22" font-weight="800" text-anchor="middle">480.5 L</text>

    <!-- Mini chart inside phone -->
    <path d="M 20 220 Q 50 170 80 190 T 140 160" fill="none" stroke="#7dcfff" stroke-width="2"/>
    
    <!-- Phone Button Card -->
    <rect x="20" y="245" width="120" height="32" rx="16" fill="#7aa2f7"/>
    <text x="80" y="265" fill="#15161e" font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle">+ Add Entry</text>
  </g>

  <!-- Right: Dashboard Stats & Analytics -->
  <g transform="translate(300, 95)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="410" height="85" rx="8" fill="#16161e" stroke="#24283b"/>
    <text x="25" y="32" fill="#a9b1d6" font-family="sans-serif" font-size="12">Total Registered Farmers</text>
    <text x="25" y="62" fill="#7dcfff" font-family="sans-serif" font-size="24" font-weight="700">64 Dairy Producers</text>
    <rect x="300" y="25" width="85" height="35" rx="6" fill="#7dcfff" opacity="0.15"/>
    <text x="342" y="47" fill="#7dcfff" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">Active</text>

    <!-- Card 2 -->
    <rect x="0" y="105" width="410" height="85" rx="8" fill="#16161e" stroke="#24283b"/>
    <text x="25" y="137" fill="#a9b1d6" font-family="sans-serif" font-size="12">Fat &amp; SNF Quality Score</text>
    <text x="25" y="167" fill="#9ece6a" font-family="sans-serif" font-size="24" font-weight="700">98.4% Optimal</text>
    <rect x="300" y="130" width="85" height="35" rx="6" fill="#9ece6a" opacity="0.15"/>
    <text x="342" y="152" fill="#9ece6a" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">Grade A</text>

    <!-- Card 3 -->
    <rect x="0" y="210" width="410" height="85" rx="8" fill="#16161e" stroke="#24283b"/>
    <text x="25" y="242" fill="#a9b1d6" font-family="sans-serif" font-size="12">Weekly Distribution Volume</text>
    <text x="25" y="272" fill="#bb9af7" font-family="sans-serif" font-size="24" font-weight="700">3,360 Liters</text>
    <rect x="300" y="235" width="85" height="35" rx="6" fill="#bb9af7" opacity="0.15"/>
    <text x="342" y="257" fill="#bb9af7" font-family="sans-serif" font-size="11" font-weight="600" text-anchor="middle">Logistics</text>
  </g>
</svg>
