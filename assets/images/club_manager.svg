  <circle cx="105" cy="50" r="6" fill="#9ece6a"/>
  <text x="400" y="55" fill="#a9b1d6" font-family="monospace" font-size="13" text-anchor="middle">ClubManager :: Member &amp; Event Portal (PHP + MySQL)</text>

